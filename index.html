<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuizMaster Pro</title>

    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="container">

        <!-- Home Screen -->
        <section id="home-screen">

            <header class="hero">
                <h1>🏆 QuizMaster Pro</h1>
                <p>Challenge your knowledge and track your progress.</p>
            </header>

            <div class="stats-card">
                <h3>Your Stats</h3>
                <p>Best Score: <span id="best-score">0</span></p>
                <p>Last Score: <span id="last-score">0</span></p>
            </div>

            <div class="difficulty">
                <h3>Select Difficulty</h3>

                <select id="difficulty">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>

            <button id="start-btn" class="btn">
                Start Quiz
            </button>

        </section>

        <!-- Quiz Screen -->
        <section id="quiz-screen" class="hidden">

            <div class="top-bar">
                <span id="question-count">1/15</span>
                <span id="timer">20s</span>
            </div>

            <div class="progress">
                <div id="progress-fill"></div>
            </div>

            <div class="score-box">
                Score: <span id="score">0</span>
            </div>

            <div class="question-card">
                <h2 id="question-text"></h2>
            </div>

            <div id="options" class="options"></div>

            <button id="next-btn" class="btn">
                Next Question
            </button>

        </section>

        <!-- Result Screen -->
        <section id="result-screen" class="hidden">

            <h1>🎉 Quiz Completed</h1>

            <div class="result-card">

                <h2 id="final-score"></h2>

                <p id="accuracy"></p>

                <p id="rank"></p>

                <button id="restart-btn" class="btn">
                    Play Again
                </button>

            </div>

        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
